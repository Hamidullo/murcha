name: murcha

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-murcha}
      POSTGRES_USER: ${POSTGRES_USER:-murcha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-murcha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-murcha}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-murcha}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-murcha123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/healthz'').then(r=>process.exit(r.ok?0:1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Xuddi shu api image, BullMQ worker rejimida — haqiqiy navbat ishlovchilari
  # (Excel import, PDF, rasm siqish...) tegishli fazalarda qo'shiladi.
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "src/worker.js"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Hozircha statik placeholder sahifa — Vue+Vite scaffold Faza 2'da shu
  # Dockerfile'ni almashtiradi (dev server yoki build+nginx static).
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"

  # murcha.uz — statik build (vite-ssg) + nginx, landing + vitrina (Faza 11).
  # Haqiqiy subdomen ajratish (murcha.uz/app./shop./api.) — Faza 12.
  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    ports:
      - "4173:80"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:

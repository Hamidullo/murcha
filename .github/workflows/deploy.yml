name: Deploy

# Faza 12 — kod/konfig sifatida yoziladi, bu sessiyada real serverga qarshi
# ishga tushirilmagan/sinovdan o'tkazilmagan (kredensial/server yo'q).
# `build-and-push` — GITHUB_TOKEN bilan ishlaydi (qo'shimcha sozlashsiz),
# GHCR'ga image push qiladi. `deploy` — faqat `SSH_HOST` sekret sozlangan
# bo'lsa ishga tushadi (repo Settings → Secrets and variables → Actions:
# SSH_HOST, SSH_USER, SSH_KEY); sozlanmagan bo'lsa jim o'tkazib yuboriladi.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile.prod
          - name: shop
            dockerfile: apps/shop/Dockerfile
          - name: landing
            dockerfile: apps/landing/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: GHCR'ga kirish
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build va push — ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # `secrets` konteksti job darajasidagi `if`da mavjud emas (faqat github/
      # needs/vars/inputs) — shuning uchun shart qadam darajasida tekshiriladi:
      # SSH_HOST sozlanmagan bo'lsa qadam jim o'tkazib yuboriladi.
      - name: Zero-downtime deploy (rolling — Docker Compose)
        if: ${{ secrets.SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/murcha
            docker compose -f docker-compose.prod.yml pull
            # `--no-deps` bog'liqliklarni ishga tushirmaydi, shuning uchun
            # migratsiya alohida va oldin bajariladi (idempotent).
            docker compose -f docker-compose.prod.yml run --rm migrate
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait api worker web shop landing
            docker image prune -f

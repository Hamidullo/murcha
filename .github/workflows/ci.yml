name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://murcha:murcha@localhost:5432/murcha?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - name: Prisma sxema tekshiruvi
        run: pnpm --filter @murcha/api db:validate

      - run: pnpm test

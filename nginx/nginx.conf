# Faza 0 — minimal reverse-proxy skeleti (bitta server, subdomen yo'q).
# Subdomen tuzilishi (murcha.uz / app. / shop. / api.) — Faza 1'da qo'shiladi
# (PLAN.md 7-bo'lim: "Domen tuzilmasi").

events {}

http {
  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://api:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://web:5173;
      proxy_set_header Host $host;
    }
  }
}

# Faza 0 — minimal reverse-proxy skeleti (bitta server, subdomen yo'q).
# Subdomen tuzilishi (murcha.uz / app. / shop. / api.) — Faza 12'da qo'shiladi
# (PLAN.md 7-bo'lim: "Domen tuzilmasi"). `landing` (murcha.uz — Faza 11) hozircha
# shu proxy'ga ulanmagan, docker-compose.yml'da alohida port (4173) bilan ochilgan
# — real domen-asosli routing (murcha.uz landing'ga, app.murcha.uz web'ga)
# nginx qatlamiga Faza 12'da qo'shiladi.

events {}

http {
  server {
    listen 80;
    server_name _;

    # DIQQAT — `proxy_pass` oxiridagi SLASH (Faza 13 Task 4'da tuzatildi):
    #   http://api:3000/  → nginx `location` prefiksini KESIB tashlaydi,
    #                       API `/v1/auth/login` oladi → 404
    #   http://api:3000   → to'liq URI uzatiladi, API `/api/v1/auth/login` oladi
    # API marshrutlari `/api/v1/...` da mount qilingan (`src/app.js`), ya'ni
    # slashsiz variant to'g'ri. Bu `vite.config.js`dagi dev proxy bilan bir xil
    # xatti-harakat (u ham yo'lni o'zgartirmaydi) — ikkisi mos bo'lishi shart,
    # aks holda `pnpm dev`da ishlab, nginx orqali ishlamaydi.
    location /api/ {
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Socket.IO — `lib/socket.js` `io("/", { path: "/socket.io" })` bilan
    # ulanadi, ya'ni O'Z origin'iga. Bu blok bo'lmasa so'rov pastdagi
    # `location /` ga tushib Vite'ga ketardi va WebSocket ulanmasdi.
    location /socket.io/ {
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://web:5173;
      proxy_set_header Host $host;
    }
  }
}

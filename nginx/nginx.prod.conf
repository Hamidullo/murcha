# Prod subdomen routing (PLAN.md 7-bo'lim "Domen tuzilmasi", Faza 12):
#   murcha.uz        — landing + kompaniya vitrinalari (`landing` konteyner)
#   app.murcha.uz    — sklad/ega ilovasi (`web` konteyner)
#   shop.murcha.uz   — do'kon PWA (`shop` konteyner)
#   api.murcha.uz    — bitta umumiy API (`api` konteyner)
#
# Bootstrap tartibi (birinchi marta, real serverda qo'lda):
#   1. Shu faylning HTTPS (443) bloklarisiz nusxasi bilan `nginx`ni ishga
#      tushiring (yoki pastdagi 80-portdagi ACME challenge location'i bilan
#      birga — certbot webroot usuli sertifikat mavjud bo'lishini talab
#      qilmaydi, faqat `/var/www/certbot` ochiq bo'lishi kerak).
#   2. `docker compose -f docker-compose.prod.yml run --rm certbot certonly
#      --webroot -w /var/www/certbot -d murcha.uz -d app.murcha.uz
#      -d shop.murcha.uz -d api.murcha.uz --email support@murcha.uz --agree-tos`
#   3. `docker compose -f docker-compose.prod.yml restart nginx` — endi
#      443-blok mavjud sertifikatlarni topadi. `certbot` konteyneri
#      (docker-compose.prod.yml) davriy yangilash uchun alohida ishlaydi.

events {}

http {
  # Let's Encrypt HTTP-01 challenge — barcha domen uchun umumiy webroot.
  server {
    listen 80;
    server_name murcha.uz app.murcha.uz shop.murcha.uz api.murcha.uz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name murcha.uz;

    ssl_certificate /etc/letsencrypt/live/murcha.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murcha.uz/privkey.pem;

    location / {
      proxy_pass http://landing:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # --- app.murcha.uz — sklad/ega ilovasi ---
  #
  # DIQQAT (Faza 13 Task 4'da tuzatildi): `apps/web` API'ga NISBIY yo'l bilan
  # murojaat qiladi — `api/client.js` `BASE_URL = "/api/v1"`, `lib/socket.js`
  # `io("/")`. Ya'ni so'rov `app.murcha.uz/api/v1/...` ga ketadi, `api.murcha.uz`
  # ga EMAS. Quyidagi `/api/` va `/socket.io/` bloklari bo'lmasa hammasi
  # pastdagi `location /` orqali statik `web` konteyneriga tushib, SPA fallback
  # tufayli `index.html` qaytarardi — login JSON o'rniga HTML olardi.
  # Lokal `pnpm dev`da bu bilinmasdi: Vite o'z proxy'si bilan aynan shu ikki
  # yo'lni API'ga uzatadi (`apps/web/vite.config.js`) — nginx unga mos bo'lishi
  # shart. Nisbiy yo'l ayni paytda CORS'ni ham keraksiz qiladi (bir origin).
  server {
    listen 443 ssl;
    server_name app.murcha.uz;

    ssl_certificate /etc/letsencrypt/live/murcha.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murcha.uz/privkey.pem;

    # `proxy_pass` oxirida slash YO'Q — to'liq URI uzatiladi (`/api/v1/...`).
    # Slash bilan bo'lsa nginx `/api/` prefiksini kesib tashlardi → 404.
    location /api/ {
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # --- shop.murcha.uz — do'kon B2B PWA (app. bilan bir xil naqsh:
  #     `apps/shop/src/api/client.js` ham `BASE_URL = "/api/v1"`) ---
  server {
    listen 443 ssl;
    server_name shop.murcha.uz;

    ssl_certificate /etc/letsencrypt/live/murcha.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murcha.uz/privkey.pem;

    location /api/ {
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://shop:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  server {
    listen 443 ssl;
    server_name api.murcha.uz;

    ssl_certificate /etc/letsencrypt/live/murcha.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murcha.uz/privkey.pem;

    # Socket.IO (WebSocket) upgrade — kuryer jonli joylashuvi/bildirishnomalar.
    location /socket.io/ {
      proxy_pass http://api:3000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://api:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
